<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="product" content="Metro UI CSS Framework">
    <meta name="description" content="Simple responsive css framework">
    <meta name="author" content="Sergey S. Pimenov, Ukraine, Kiev">

    <link href="css/metro-bootstrap.css" rel="stylesheet">
    <link href="css/metro-bootstrap-responsive.css" rel="stylesheet">
    <link href="css/iconFont.css" rel="stylesheet">
    <link href="css/docs.css" rel="stylesheet">
    <link href="js/prettify/prettify.css" rel="stylesheet">

    <!-- Load JavaScript Libraries -->
    <script src="js/jquery/jquery.min.js"></script>
    <script src="js/jquery/jquery.widget.min.js"></script>
    <script src="js/jquery/jquery.mousewheel.js"></script>
    <script src="js/jquery/jquery.dataTables.js"></script>
    <script src="js/prettify/prettify.js"></script>

    <!-- Metro UI CSS JavaScript plugins -->
    <script src="js/load-metro.js"></script>

    <!-- Local JavaScript -->
    <script src="js/docs.js"></script>
    <script src="js/github.info.js"></script>

    <title>Metro UI CSS : Metro Bootstrap CSS Library</title>
</head>
<body class="metro">
            <table class="table striped hovered dataTable" id="dataTables-1">
                <thead>
                <tr>
                    <th class="text-left">Engine</th>
                    <th class="text-left">Browser</th>
                    <th class="text-left">Platform</th>
                    <th class="text-left">Version</th>
                    <th class="text-left">CSS grade</th>
                </tr>
                </thead>

                <tbody>
               	<tr>
                    <th class="text-left">AA</th>
                    <th class="text-left">BB</th>
                    <th class="text-left">CC</th>
                    <th class="text-left">DD</th>
                    <th class="text-left">EE</th>
                </tr>
               	<tr>
                    <th class="text-left">FF</th>
                    <th class="text-left">GG</th>
                    <th class="text-left">HH</th>
                    <th class="text-left">JJ</th>
                    <th class="text-left">II</th>
                </tr>
                </tbody>

                <tfoot>
                <tr>
                    <th class="text-left">Engine</th>
                    <th class="text-left">Browser</th>
                    <th class="text-left">Platform</th>
                    <th class="text-left">Version</th>
                    <th class="text-left">CSS grade</th>
                </tr>
                </tfoot>
            </table>

            <script>
                $(function(){
                    $('#dataTables-1').dataTable( {
                        "bProcessing": true,
                        "sAjaxSource": "data/dataTables-objects.txt",
                        "aoColumns": [
                            { "mData": "engine" },
                            { "mData": "browser" },
                            { "mData": "platform" },
                            { "mData": "version" },
                            { "mData": "grade" }
                        ]
                    } );
                });
            </script>
        </div>
    </div>

    <script src="js/hitua.js"></script>

</body>
</html>
