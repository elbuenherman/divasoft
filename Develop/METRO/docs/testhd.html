        <div style="background: url(images/b1.jpg) top left no-repeat; background-size: cover; height: 300px;">

                    <img src="images/divalogo.png" class="span3">

                </h2>

        </div>
</div>
    <div class="herman" style="position: absolute; left:200px; top:310px; width:500px;">   
    <h3>Ingrese sus datos:</h3>
    <form name="HOLA">
    	<fieldset>
         <label>
        	<div class="input-control text" data-role="input-control">
            	<input name="strUsuario" type="text" placeholder="nombre de usuario" autofocus="autofocus" tabindex="1">

            </div>
         </label>
         <label>
			<div class="input-control text" data-role="input-control">
    			<input name="strPassword" type="password" placeholder="password"  autofocus="autofocus" tabindex="3">
    			<button class="btn-clear" tabindex="-1" ></button>
    		</div>
         </label>
         <input type="submit" value="Submit">
     	</fieldset>
     </form>
